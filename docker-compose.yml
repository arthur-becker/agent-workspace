# Dokploy "Compose" deployment for the Claude Code agent workspace.
#
# In Dokploy: create a Compose service, point it at this repo, and set the
# environment variables below in the UI (or via the .env). Then add a Domain
# pointing at the "workspace" service container port 8080 to reach browser VS Code,
# and publish port 22 (mapped to SSH_PUBLISH_PORT) for SSH / Remote-SSH.

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-workspace:latest
    restart: unless-stopped
    # Lets the entrypoint install blackhole routes to cloud-metadata IPs (and
    # nothing else — the non-root agent can't use this cap). See SECURITY.md.
    cap_add:
      - NET_ADMIN
    environment:
      # --- SSH (paths 1 & 2) ---
      AUTHORIZED_KEYS: "${AUTHORIZED_KEYS:-}"   # your SSH public key(s), newline-separated
      SSH_PASSWORD: "${SSH_PASSWORD:-}"         # optional; leave empty to force key-only auth
      # --- code-server / browser VS Code (path 3) ---
      CODE_SERVER_PASSWORD: "${CODE_SERVER_PASSWORD:-}"
      CODE_SERVER_PORT: "8080"
      # NOTE: ANTHROPIC_API_KEY is intentionally NOT set here — secrets in the
      # container env are readable by the agent. Log in with `claude`
      # interactively instead (creds persist in the workspace-home volume).
      # See SECURITY.md for the apiKeyHelper option if you need non-interactive auth.
    ports:
      # host:container — SSH. Pick a free host port in Dokploy (e.g. 2222).
      - "${SSH_PUBLISH_PORT:-2222}:22"
    expose:
      - "8080"   # code-server — routed by Dokploy's Traefik via a Domain
    volumes:
      # Persist projects and the agent home (Claude creds, code-server state, shell history).
      - workspace-projects:/workspace
      - workspace-home:/home/agent
    # Recommended on a shared prod host: cap resources so the agent can't starve prod.
    # Uncomment and tune to your host (or set in Dokploy's UI).
    # deploy:
    #   resources:
    #     limits: { cpus: "2", memory: 4g }
    depends_on:
      - docker
    networks:
      - default      # reachable by Dokploy/Traefik for the code-server domain
      - dind         # private link to the isolated Docker daemon

  # ROOTLESS Docker-in-Docker. The agent's `docker` CLI builds AND runs
  # containers HERE — not on the host. Crucially this runs WITHOUT privileged:
  # the daemon and everything it spawns are an unprivileged, user-namespaced
  # user, so an escape can't become host root. Safe(r) to run alongside prod.
  # NOTE: requires a host with cgroup v2 (default on Ubuntu 22.04+/recent Debian).
  # This config should be smoke-tested on YOUR host — see SECURITY.md.
  docker:
    image: docker:27-dind-rootless
    restart: unless-stopped
    # No `privileged: true`. Rootless needs nested user namespaces, which the
    # default seccomp/apparmor profiles block — hence unconfined here. Combined
    # with rootless (no real root) this is far weaker than a privileged daemon.
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    devices:
      - /dev/fuse        # fuse-overlayfs storage driver (remove if host lacks it)
    environment:
      DOCKER_TLS_CERTDIR: ""          # plain TCP on the private 'dind' network only
    command: ["--host=tcp://0.0.0.0:2375"]
    volumes:
      # Rootless daemon stores data under the rootless user's home, not /var/lib/docker.
      - dind-storage:/home/rootless/.local/share/docker
    # deploy:
    #   resources:
    #     limits: { cpus: "2", memory: 4g }
    networks:
      - dind
    # No `ports:` — 2375 is only reachable by the workspace over the private network.

volumes:
  workspace-projects:
  workspace-home:
  dind-storage:

networks:
  default:
  dind:
    # Private link between workspace <-> dind. Port 2375 is unreachable from the
    # host/internet (no published port). NOT marked `internal` so dind can still
    # pull base images from registries during `docker build`.
